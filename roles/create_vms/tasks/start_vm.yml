---
- name: Start the cloned VM
  community.general.proxmox_kvm:
    api_host: "{{ PROXMOX_API_HOST }}"
    api_user: "{{ PROXMOX_API_USERNAME }}"
    api_password: "{{ PROXMOX_API_PASSWORD }}"
    node: "{{ PROXMOX_NODE }}"
    vmid: "{{ cloned_vm.vmid }}"
    state: started
  when: cloned_vm is defined and cloned_vm.vmid is defined
